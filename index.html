<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>すくわくネットワーク</title>

<style>
body {
  margin: 0;
  font-family: 'Helvetica Neue', Arial, sans-serif;
  background: #f8f9fa;
  color: #333;
}

header {
  background: #4a90e2;
  color: white;
  padding: 15px 20px;
  position: sticky;
  top: 0;
  z-index: 100;
}

nav a {
  color: white;
  margin: 0 12px;
  text-decoration: none;
  font-weight: bold;
  transition: 0.3s;
}

nav a:hover {
  opacity: 0.7;
}

nav a.active {
  border-bottom: 2px solid white;
}

.hero {
  height: 320px;
  background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
              url('https://via.placeholder.com/1200x320') center/cover no-repeat;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  text-align: center;
}

.hero h1 {
  font-size: 42px;
  margin: 0;
}

.main {
  max-width: 1200px;
  margin: 30px auto;
  padding: 0 20px;
}

.home-layout {
  display: flex;
  gap: 30px;
  flex-wrap: wrap;
}

.content {
  flex: 2;
}

.sidebar {
  flex: 1;
  min-width: 280px;
}

.single-layout {
  max-width: 800px;
  margin: auto;
}

.section {
  margin-bottom: 40px;
}

.section h2 {
  border-left: 6px solid #4a90e2;
  padding-left: 15px;
}

.card-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  border-radius: 12px;
  overflow: hidden;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
}

/* 👇 カードホバー */
.card:hover {
  transform: translateY(-8px) scale(1.02);
  box-shadow: 0 12px 30px rgba(74,144,226,0.3);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
  transition: 0.3s;
}

/* 👇 画像ちょいズーム */
.card:hover img {
  transform: scale(1.05);
}

.card-body {
  padding: 15px;
}

.tag {
  display: inline-block;
  background: #e3f2fd;
  color: #1976d2;
  padding: 4px 12px;
  border-radius: 20px;
  font-size: 13px;
  transition: 0.2s;
}

/* 👇 タグホバー */
.tag:hover {
  background: #4a90e2;
  color: white;
  transform: translateY(-2px);
}

.insta {
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
}

/* 👇 サイドカードも浮かす */
.insta:hover {
  transform: translateY(-5px);
}

.tab-content {
  display: none;
}

.tab-content.active {
  display: block;
}
</style>
</head>

<body>

<header>
  <div style="max-width:1200px; margin:auto; display:flex; justify-content:space-between; align-items:center;">
    <h2>すくわくネットワーク</h2>
    <nav>
      <a href="#" data-tab="home" class="active">ホーム</a>
      <a href="#" data-tab="event">地域イベント</a>
      <a href="#" data-tab="program">すくわくプログラム</a>
      <a href="https://himawari-fukushikai.org/" target="_blank">法人HP</a>
      <a href="https://recruit.jobcan.jp/himawari-fukushikai/" target="_blank">採用情報</a>
    </nav>
  </div>
</header>

<div class="hero">
  <h1>子どもたちの未来をつなぐ</h1>
</div>

<div class="main">

  <div class="tab-content active" id="home">
    <div class="home-layout">

      <div class="content">
        <div class="section">
          <h2>最新のお知らせ</h2>
          <div class="card-grid" id="news-grid"></div>
        </div>

        <div class="section">
          <h2>今月のすくわくプログラム</h2>
          <div class="card-grid" id="program-grid"></div>
        </div>
      </div>

      <div class="sidebar">
        <h3>タグ</h3>
        <span class="tag">0歳</span>
        <span class="tag">1歳</span>
        <span class="tag">行事</span>

        <div class="insta" style="margin-top:30px;">
          Instagram
        </div>
      </div>

    </div>
  </div>

  <div class="tab-content" id="event">
    <div class="single-layout">
      <div class="section">
        <h2>地域イベント</h2>
        <div class="card">親子ふれあいデー開催予定！</div>
      </div>
    </div>
  </div>

  <div class="tab-content" id="program">
    <div class="single-layout">
      <div class="section">
        <h2>すくわくプログラム詳細</h2>
        <div class="card">リズム遊び・制作活動など</div>
      </div>
    </div>
  </div>

</div>

<script>
const tabs = document.querySelectorAll('nav a[data-tab]');
const contents = document.querySelectorAll('.tab-content');

tabs.forEach(tab => {
  tab.addEventListener('click', e => {
    e.preventDefault();

    tabs.forEach(t => t.classList.remove('active'));
    tab.classList.add('active');

    const target = tab.dataset.tab;
    contents.forEach(c => c.classList.remove('active'));
    document.getElementById(target).classList.add('active');
  });
});

const newsCards = [
  {title: "桜の季節の外遊び", desc: "8園合同で実施！", img: "https://via.placeholder.com/300x180/4a90e2/ffffff"},
  {title: "新年度スタート", desc: "元気に通園中", img: "https://via.placeholder.com/300x180/ff9800/ffffff"}
];

function createCard(card) {
  const div = document.createElement('div');
  div.className = 'card';
  div.innerHTML = `
    <img src="${card.img}">
    <div class="card-body">
      <h3>${card.title}</h3>
      <p>${card.desc}</p>
    </div>
  `;
  return div;
}

document.getElementById('news-grid').append(...newsCards.map(createCard));
document.getElementById('program-grid').append(...newsCards.map(createCard));
</script>

</body>
</html>
