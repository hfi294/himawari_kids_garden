<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>すくわくネットワーク</title>
  <style>
    /* 前のコードと同じ綺麗な感じ + 切り替え用 */
    body { margin:0; font-family:sans-serif; background:#f8f9fa; }
    header { background:#4a90e2; padding:15px 20px; color:white; position:sticky; top:0; z-index:100; }
    nav a { color:white; margin:0 18px; text-decoration:none; font-weight:bold; cursor:pointer; }
    .hero { height:340px; background: linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)), url('hero.jpg') center/cover; color:white; display:flex; align-items:center; justify-content:center; text-align:center; }
    .content-area { max-width:1200px; margin:30px auto; padding:0 20px; min-height:600px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .card-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(280px,1fr)); gap:20px; }
    .card img { width:100%; height:180px; object-fit:cover; border-radius:8px 8px 0 0; }
  </style>
</head>
<body>

  <header>
    <div style="max-width:1200px;margin:auto;display:flex;justify-content:space-between;align-items:center;">
      <h2>すくわくネットワーク</h2>
      <nav>
        <a onclick="switchTab(0)">ホーム</a>
        <a onclick="switchTab(1)">園の概要</a>
        <a onclick="switchTab(2)">地域イベント</a>
        <a onclick="switchTab(3)">すくわくプログラム</a>
        <a onclick="switchTab(4)">採用情報</a>
      </nav>
    </div>
  </header>

  <div class="hero">
    <h1>子どもたちの笑顔を<br>みんなでつなげよう</h1>
  </div>

  <div class="content-area">

    <!-- ホーム -->
    <div id="tab0" class="tab-content active">
      <h2>最新のお知らせ</h2>
      <div class="card-grid" id="home-cards"></div>
    </div>

    <!-- 園の概要 -->
    <div id="tab1" class="tab-content">
      <h2>8園の紹介</h2>
      <p>ここに8園のカードを並べるよ</p>
    </div>

    <!-- 他のタブも後で追加 -->

  </div>

  <script>
    function switchTab(n) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById('tab' + n).classList.add('active');
    }

    // サンプルカード
    const sampleCards = [
      {title:"桜の外遊び", desc:"全園合同で楽しんできました！", img:"https://via.placeholder.com/600x340/4a90e2/fff?text=桜"},
    ];

    function renderCards() {
      const container = document.getElementById('home-cards');
      sampleCards.forEach(card => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <img src="${card.img}">
          <div style="padding:15px;">
            <h3>${card.title}</h3>
            <p>${card.desc}</p>
          </div>
        `;
        container.appendChild(div);
      });
    }

    renderCards();
  </script>
</body>
</html>
