<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>すくわくネットワーク</title>
  <style>
    body { margin:0; font-family:sans-serif; background:#f8f9fa; color:#333; }
    header {
      background:#4a90e2;
      color:white;
      padding:15px 20px;
      position:sticky;
      top:0;
      z-index:100;
    }
    nav a {
      color:white;
      margin:0 18px;
      text-decoration:none;
      font-weight:bold;
      cursor:pointer;
    }
    .hero {
      height:340px;
      background: linear-gradient(rgba(0,0,0,0.45),rgba(0,0,0,0.45)), url('hero.jpg') center/cover no-repeat;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
    }
    .main {
      max-width:1200px;
      margin:30px auto;
      padding:0 20px;
      display:flex;
      gap:30px;
      flex-wrap:wrap;
    }
    .content {
      flex: 2;
      min-width: 300px;
    }
    .sidebar {
      flex: 1;
      min-width: 280px;
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: 0.3s;
    }
    .card:hover { transform: translateY(-8px); }
    .card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }
    .card-body { padding: 15px; }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .tag {
      background: #e3f2fd;
      color: #1976d2;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
    }
    .insta-box {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      margin-top: 30px;
    }
  </style>
</head>
<body>

  <header>
    <div style="max-width:1200px;margin:auto;display:flex;justify-content:space-between;align-items:center;">
      <h2>すくわくネットワーク</h2>
      <nav>
        <a onclick="switchTab(0)">ホーム</a>
        <a onclick="switchTab(1)">園の概要</a>
        <a onclick="switchTab(2)">地域イベント</a>
        <a onclick="switchTab(3)">すくわくプログラム</a>
        <a onclick="switchTab(4)">採用情報</a>
      </nav>
    </div>
  </header>

  <div class="hero">
    <h1>子どもたちの笑顔を<br>みんなでつなげよう</h1>
  </div>

  <div class="main">

    <!-- ==================== ホーム（2カラム） ==================== -->
    <div id="tab0" class="tab-content active">
      <div class="content">
        <h2>最新のお知らせ</h2>
        <div class="card-grid" id="news-grid"></div>
      </div>

      <div class="sidebar">
        <h3>タグで探す</h3>
        <div class="tags">
          <span class="tag">全園共通</span>
          <span class="tag">0歳児</span>
          <span class="tag">1歳児</span>
          <span class="tag">2歳児</span>
          <span class="tag">3歳児</span>
          <span class="tag">4歳児</span>
          <span class="tag">5歳児</span>
          <span class="tag">食育</span>
          <span class="tag">行事</span>
          <span class="tag">保護者向け</span>
        </div>

        <div class="insta-box">
          <h3>Instagramタイムライン</h3>
          <p>各園の日常をチェック！</p>
          <div style="background:#eee; height:320px; border-radius:8px; margin-top:15px;">
            Instagram埋め込み予定
          </div>
        </div>
      </div>
    </div>

    <!-- 他のタブ（シンプルに切り替え） -->
    <div id="tab1" class="tab-content"> <h2>園の概要</h2> <p>8園の紹介をここに書きます</p> </div>
    <div id="tab2" class="tab-content"> <h2>地域イベント</h2> <p>今後のイベント情報をここに</p> </div>
    <div id="tab3" class="tab-content"> <h2>すくわくプログラム</h2> <p>各園の活動をここに</p> </div>
    <div id="tab4" class="tab-content"> <h2>採用情報</h2> <p>募集内容をここに</p> </div>

  </div>

  <script>
    function switchTab(n) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById('tab' + n).classList.add('active');
    }

    // サンプルカード
    const newsCards = [
      {title: "桜の季節の外遊び", desc: "8園合同で楽しんできました！", img: "https://via.placeholder.com/600x340/4a90e2/fff?text=桜"},
      {title: "新年度スタート", desc: "みんな元気に通園しています", img: "https://via.placeholder.com/600x340/ff9800/fff?text=新年度"}
    ];

    function renderNews() {
      const container = document.getElementById('news-grid');
      newsCards.forEach(card => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `
          <img src="${card.img}">
          <div class="card-body">
            <h3>${card.title}</h3>
            <p>${card.desc}</p>
          </div>
        `;
        container.appendChild(div);
      });
    }

    renderNews();
  </script>
</body>
</html>
